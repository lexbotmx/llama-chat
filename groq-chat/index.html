<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groq Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0a;
    --surface: #111811;
    --border: #1e2e1e;
    --accent: #22c55e;
    --accent2: #06b6d4;
    --text: #e8f0e8;
    --muted: #5a7a5a;
    --user-bg: #1a2e1a;
    --ai-bg: #0f1a0f;
    --glow: rgba(34, 197, 94, 0.15);
    --header-bg: rgba(10,15,10,0.9);
    --input-area-bg: rgba(10,15,10,0.95);
  }

  body.light {
    --bg: #f4f8f4;
    --surface: #ffffff;
    --border: #dde8dd;
    --accent: #16a34a;
    --accent2: #0891b2;
    --text: #1a2e1a;
    --muted: #88aa88;
    --user-bg: #eef8ee;
    --ai-bg: #f9fcf9;
    --glow: rgba(22, 163, 74, 0.12);
    --header-bg: rgba(244,248,244,0.95);
    --input-area-bg: rgba(244,248,244,0.98);
  }

  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.2s;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }



  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--header-bg);
    backdrop-filter: blur(10px);
  }

  .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--glow);
  }

  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-text p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }





  .new-chat-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .new-chat-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .empty-state p {
    font-size: 12px;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.8;
    margin: 0 auto;
    text-align: center;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Empty state */
  .empty-state {
    margin: auto;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .empty-state .big-logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
    box-shadow: 0 0 40px var(--glow);
  }

  .empty-state h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }



  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 24px;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(124,106,255,0.05);
  }

  /* Message bubbles */
  .message {
    display: flex;
    gap: 16px;
    max-width: 800px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .message.user { flex-direction: row-reverse; margin-left: auto; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .message.user .avatar {
    background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
    border: 1px solid var(--border);
  }

  .message.ai .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px var(--glow);
  }

  .bubble {
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.8;
    max-width: calc(100% - 48px);
    position: relative;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--border);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .message.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.ai .bubble::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(124,106,255,0.03), transparent);
    pointer-events: none;
  }

  .msg-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  .message.user .msg-meta { text-align: right; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 6px 0;
    align-items: center;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing 1.2s ease-in-out infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 20px 32px;
    border-top: 1px solid var(--border);
    background: var(--input-area-bg);
    backdrop-filter: blur(10px);
  }

  .input-wrapper {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  #prompt {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 20px;
    overflow-y: auto;
  }

  #prompt::placeholder { color: var(--muted); }

  #prompt::-webkit-scrollbar { width: 3px; }
  #prompt::-webkit-scrollbar-thumb { background: var(--border); }

  #send-btn {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 16px var(--glow);
  }

  #send-btn:hover { transform: scale(1.05); box-shadow: 0 0 24px var(--glow); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 16px; height: 16px; fill: white; }

  .input-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    text-align: center;
  }

  /* Error message */
  .error-msg {
    background: rgba(255, 80, 80, 0.1);
    border: 1px solid rgba(255, 80, 80, 0.3);
    color: #ff8080;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 12px;
    animation: slideIn 0.3s ease;
  }
</style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>Groq Chat</h1>
    <p>Powered by Llama 3.1 8B · Groq LPU</p>
  </div>
  <button class="new-chat-btn" onclick="newChat()">+ new chat</button>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
</header>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <h2>What's on your mind?</h2>
    <p>Powered by Groq LPU — blazing fast inference. Ask me anything — I remember our conversation.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="useSuggestion(this)">Explain quantum computing simply</button>
      <button class="suggestion" onclick="useSuggestion(this)">Write a haiku about serverless</button>
      <button class="suggestion" onclick="useSuggestion(this)">What is AWS Lambda?</button>
      <button class="suggestion" onclick="useSuggestion(this)">Tell me a short story</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="prompt" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
  // Dark/light toggle
  function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('theme-toggle');
    body.classList.toggle('light');
    btn.textContent = body.classList.contains('light') ? '🌙' : '☀️';
    localStorage.setItem('theme', body.classList.contains('light') ? 'light' : 'dark');
  }

  // Restore saved theme
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-toggle').textContent = '🌙';
  }

  const LAMBDA_URL = 'https://7zmwhrasvmjylvnrlhoechrxw40gdcxf.lambda-url.us-west-1.on.aws/';
  const API_KEY = '6NHKZncxtu8THku5Ym7No0HTxnYhGNAr';

  let sessionId = generateSessionId();
  let isLoading = false;

  function generateSessionId() {
    return 'session_' + Math.random().toString(36).substr(2, 9);
  }

  function setStatus(status) {
    // Status indicator removed — no-op
  }

  function newChat() {
    sessionId = generateSessionId();
    document.getElementById('messages').innerHTML = `
      <div class="empty-state" id="empty-state">
        <h2>What's on your mind?</h2>
        <p>Powered by Groq LPU — blazing fast inference. Ask me anything — I remember our conversation.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="useSuggestion(this)">Explain quantum computing simply</button>
          <button class="suggestion" onclick="useSuggestion(this)">Write a haiku about serverless</button>
          <button class="suggestion" onclick="useSuggestion(this)">What is AWS Lambda?</button>
          <button class="suggestion" onclick="useSuggestion(this)">Tell me a short story</button>
        </div>
      </div>`;
  }

  function useSuggestion(el) {
    document.getElementById('prompt').value = el.textContent;
    sendMessage();
  }

  function formatTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, content) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    if (role === 'user') {
      div.innerHTML = `
        <div class="avatar">👤</div>
        <div>
          <div class="bubble">${escapeHtml(content)}</div>
          <div class="msg-meta">${formatTime()}</div>
        </div>`;
    } else {
      div.innerHTML = `
        <div class="avatar">🦙</div>
        <div>
          <div class="bubble">${escapeHtml(content)}</div>
          <div class="msg-meta">Llama 3.1 8B · ${formatTime()}</div>
        </div>`;
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function appendTyping() {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing-msg';
    div.innerHTML = `
      <div class="avatar">🦙</div>
      <div>
        <div class="bubble">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
  }

  function appendError(msg) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = '⚠ ' + msg;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const input = document.getElementById('prompt');
    const message = input.value.trim();
    if (!message || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    setStatus('loading');

    appendMessage('user', message);
    appendTyping();

    try {
      const response = await fetch(LAMBDA_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
        body: JSON.stringify({ message, session_id: sessionId })
      });

      const data = await response.json();
      removeTyping();

      if (data.error) {
        appendError(data.error);
      } else {
        appendMessage('ai', data.response || 'No response received.');
      }
    } catch (err) {
      removeTyping();
      appendError('Could not reach Lambda. Check your connection or function URL.');
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    setStatus('ready');
    input.focus();
  }

  // Auto-resize textarea
  const textarea = document.getElementById('prompt');
  textarea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
